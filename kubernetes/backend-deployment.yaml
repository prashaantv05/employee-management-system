apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ems
  labels:
    app: backend
spec:
  replicas: 2 # Minimum 2 backend replicas for horizontal scaling
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ems-express-backend:latest # Local built image, or pull path
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: api
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: DB_NAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: DB_PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: NODE_ENV
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ems-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
