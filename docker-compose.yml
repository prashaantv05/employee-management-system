version: '3.8'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: ems-mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automates table creation and seed data execution on first bootup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ems-network

  # Express Node.js API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems-express-backend
    restart: always
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=employee_db
      - DB_PORT=3306
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ems-network

  # React Frontend Service (Nginx webserver)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ems-react-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ems-network

volumes:
  mysql_data:

networks:
  ems-network:
    driver: bridge
